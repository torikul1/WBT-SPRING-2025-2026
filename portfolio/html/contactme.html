<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Torikul Roman</title>
    <link rel="stylesheet" href="../css/contactme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <header>
        <div class="container navbar-container">
            <h1 class="logo">Torikul <span>Roman</span></h1>
            <nav>
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../html/experience.html">Experience</a></li>
                    <li><a href="../html/project.html">Projects</a></li>
                    <li><a href="../html/education.html">Education</a></li>
                    <li><a href="../html/contactme.html">Contact Me</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container contact-page">
        <section class="section-intro">
            <h1>Get in Touch</h1>
            <p>Have a project in mind or just want to say hi? Feel free to send a message.</p>
        </section>

        <div class="contact-card">
            <form class="styled-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstname">First Name</label>
                        <input type="text" id="firstname" placeholder="Torikul" required>
                    </div>
                    <div class="form-group">
                        <label for="lastname">Last Name</label>
                        <input type="text" id="lastname" placeholder="Roman" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="company">Company (Optional)</label>
                        <input type="text" id="company" placeholder="e.g. Google">
                    </div>
                </div>

                <div class="form-group">
                    <label>Reason for Contact</label>
                    <div class="radio-grid">
                        <label class="radio-item">
                            <input type="radio" name="reason" value="project" required> <span>Project</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="reason" value="thesis"> <span>Thesis</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="reason" value="job"> <span>Job Inquiry</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Areas of Interest</label>
                    <div class="checkbox-grid">
                        <label class="check-item">
                            <input type="checkbox" value="web"> <span>Web Dev</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" value="mobile"> <span>Mobile Dev</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" value="ai"> <span>AI/ML</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="consultationdate">Preferred Consultation Date</label>
                    <input type="date" id="consultationdate" required>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-submit">Send Message</button>
                    <button type="reset" class="btn-reset">Clear Form</button>
                </div>
            </form>
        </div>
    </main>

     <footer>
        <div class="container footer-content">
            <p class="footertitle">Connect on Social Networks</p>
            <ul class="footer-icons">
                <li><a href="https://www.facebook.com/tori6kul"><img src="../pic/icons8-facebook-100.png"
                            alt="Facebook"></a></li>
                <li><a href="https://www.instagram.com/torikulroman2/"><img src="../pic/icons8-linkedin-100.png"
                            alt="LinkedIn"></a></li>
                <li><a href="https://github.com/torikul1"><img src="../pic/icons8-github-100.png" alt="GitHub"></a></li>
            </ul>
            <p>&copy; 2026 Torikul Roman. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
